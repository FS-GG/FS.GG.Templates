schemaVersion: 1
providers:
  - name: rendering
    contractVersion: "1.1.0"      # scaffold-provider 1.1.0: this descriptor declares identifierParameter (below)
    templateId: fs-gg-ui          # FS.GG.Rendering's runnable Skia/Elmish app template
    source: FS.GG.UI.Template::0.10.0   # MACHINE-MAINTAINED value (bump-rendering-pin.sh). Published NuGet package, version-pinned; publish-before-flip FR-007. What this version IS: see the PIN HISTORY block at the top of this file.
    # scaffold-provider identifier split (FS.GG.SDD feature 080, FS.GG.Rendering#142): the raw
    # product name flows to `productName` (verbatim in string/path/.fsproj/.slnx contexts), and
    # `fsgg-sdd scaffold` forwards an SDD-DERIVED valid-F# namespace to `rootNamespace`, which the
    # template imprints into every `namespace`/`module`/`open`/`let` position. This makes a product
    # whose name is a legal product name but an illegal F# identifier (e.g. hyphenated
    # `Roquelike-DungeonCrawler`) compile. Older SDD ignores `identifierParameter` → no derivation,
    # identical to before (the template is byte-identical for names already valid as F# identifiers).
    nameParameter: productName        # source: the raw product name (string/path/.fsproj/.slnx)
    identifierParameter: rootNamespace  # sink: the derived valid-F# namespace (identifier positions)
    # ADR-0008 (FS-GG/.github#86, epic #85): the ORCHESTRATOR axis of the coherent set. A
    # scaffold has TWO inputs — this template@<source pin> (governed above) AND the fsgg-sdd
    # CLI@<installed> (was ungoverned). The CLI seeds artifacts a product on this pin is
    # EXPECTED to contain: the fs-gg-sdd-* process skills (FS.GG.SDD Feature 051/056) and
    # .fsgg/early-stage-guidance.md (Feature 049). So the coherent set carries a MINIMUM
    # coherent fsgg-sdd version — the oldest CLI that seeds them — recorded here alongside
    # `source` so a scaffold can check the installed CLI against the coherent-set minimum
    # (fsgg-sdd stamps used+minimum into scaffold-provenance + warns when behind — FS.GG.SDD#49).
    # Mirrors registry `fs-gg-ui-template.minimum-fsgg-sdd` (coherence id
    # `fsgg-sdd-orchestrator-axis`). Bump `version` in lockstep with the registry.
    minimumFsggSdd:
      version: "0.6.0"         # PINNED (FR-007 satisfied): FS.GG.SDD released v0.6.0 (FS.GG.SDD.Cli
                               # 0.6.0 on the org feed; dual-published to nuget.org), shipping
                               # Feature 073 (transient-artifact taxonomy): the CLI now SEEDS a
                               # `.gitignore` for regenerable output into scaffolded products. That
                               # grows the seeded-artifact surface a product on this pin is EXPECTED
                               # to contain, so per FR-011 the minimum coherent CLI advances
                               # 0.4.0 -> 0.6.0. 0.6.0 is the OLDEST published CLI that seeds the
                               # `.gitignore` (0.5.0 did not). Supersedes the prior 0.4.0 pin
                               # (Feature 056, 3-root skill union — still seeded, floor now higher).
                               # Mirrors registry pin fs-gg-ui-template.minimum-fsgg-sdd
                               # (FS-GG/.github#189), re-mirrored here by FS.GG.Templates#99.
      requires: "FS.GG.SDD Feature 049 (early-stage-guidance) + Feature 051 (seeded fs-gg-sdd-* process skills) + Feature 056 (3-root byte-identical union fan-out) + Feature 073 (seeded .gitignore for regenerable output)"
      adr: "FS-GG/.github docs/adr/0008-fsgg-sdd-cli-first-class-member-of-coherent-set.md"
      registry: "FS-GG/.github registry/dependencies.yml -> fs-gg-ui-template.minimum-fsgg-sdd"
      tracking: "https://github.com/FS-GG/FS.GG.Templates/issues/99"
    parameters:
      # lifecycle=sdd -> app-only product + SDD skeleton (ADR-0002 composition-by-scaffold).
      # Override the template default (spec-kit) so Templates composition emits the SDD shape.
      - key: lifecycle
        required: false
        default: sdd
      # Default starter flipped app -> game (issue #39 / SDD#44): the fs-gg-ui `game`
      # profile is the game/rendering default starter (ADR FS.GG.Rendering 0010, Accepted).
      # `app` (controls showcase) stays explicitly selectable via --param profile=app.
      - key: profile
        required: false
        default: game
      - key: designSystem
        required: false
        default: wcag
