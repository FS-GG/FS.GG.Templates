name: composition

on:
  push:
    branches: [main]
    # README.md is a genuine coherence surface (the test greps it) and lives at the repo root, so
    # it stays in scope; only docs/** (incl. docs/TestSpecs/**, docs/reports/**) is exempt — a
    # docs-only edit must not pay for a full pack→scaffold→build→govern run. Everything else that
    # can affect the composed product still triggers the gate.
    #
    # THE SAME docs/** RULE IS ALSO ENCODED IN THE `scope` STEP BELOW, which is what applies it to
    # pull requests. Two syntaxes, one rule: widen the exemption here and you MUST widen it there,
    # or a PR and its own post-merge push will disagree about whether to run the gate.
    paths-ignore: ['docs/**']
  # NO paths-ignore on pull_request, deliberately. `composition` is a REQUIRED check on main, and a
  # workflow skipped by a path filter never reports at all — its check sits "Expected" forever and
  # the PR can never merge (not even for an admin: enforce_admins is on). The docs-only exemption is
  # therefore applied INSIDE the job (see the `scope` step) rather than at the trigger: the job always
  # runs and always reports, but a docs-only PR skips the expensive stages and passes for free.
  pull_request:

# One in-flight run per ref: a force-pushed PR (or rapid re-push) cancels its own stale run rather
# than stacking redundant full-composition runs that each pack, scaffold, and build the live app.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  composition:
    runs-on: ubuntu-latest
    # A hung feed/scaffold/build must not hold a runner for the 6-hour default; a healthy full run
    # is well under this.
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read         # pull the published Governance CLI from the org feed (below)
      pull-requests: read    # `scope` reads the PR's file list to apply the docs-only exemption
    steps:
      # The docs-only exemption that used to be a `paths-ignore` on the trigger (see the comment on
      # `push` above — same rule, and README.md stays in scope because the test greps it). Expressed
      # as a step, the job still REPORTS `composition` on a docs-only PR instead of never running:
      # a job whose later steps all skip still concludes `success`, which is what a required check
      # needs, whereas a workflow that never starts reports nothing and wedges the PR forever.
      #
      # Runs BEFORE checkout, and needs no working tree — so a docs-only PR skips the clone too, not
      # just the expensive stages.
      - name: Scope
        id: scope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != 'pull_request' ]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"     # push: the trigger's paths-ignore already filtered
            exit 0
          fi
          # NEVER SKIP ON AMBIGUITY, and never fail on it either. `composition` is a required check,
          # so aborting here (set -e on a 5xx or a secondary rate limit) would redden the gate and
          # block an unrelated PR on an API blip — with enforce_admins on, unmergeable by anyone
          # until someone re-runs it. If we cannot read the file list, run the full gate: slower, but
          # it can only ever be correct.
          if ! files="$(gh api --paginate \
                "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
                --jq '.[].filename')"; then
            echo '::warning::Could not read the PR file list — running the full gate rather than guessing.'
            echo 'run=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Same reasoning for an empty list: "we could not tell", so run the gate.
          if [ -z "$files" ]; then
            echo '::warning::Empty PR file list — running the full gate rather than guessing.'
            echo 'run=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Prefix test in pure shell rather than `grep -qv`: the exit status of `-q` combined with
          # `-v` is not consistent across grep implementations, and the direction this would fail in
          # is "silently skip the build on a code change".
          run=false
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            case "$f" in
              docs/*) ;;                  # exempt
              *)      run=true; break ;;  # anything else earns the full gate
            esac
          done <<< "$files"
          if [ "$run" = 'true' ]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo 'Docs-only change — skipping the full composition run (reporting success).'
            printf '%s\n' "$files" | sed 's/^/  /'
            echo 'run=false' >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v7
        if: steps.scope.outputs.run == 'true'
      - uses: actions/setup-dotnet@v6
        if: steps.scope.outputs.run == 'true'
        with:
          dotnet-version: '10.0.x'
      # Install the published FS-GG CLIs from the org feed so the gated stages ASSERT instead of
      # skipping (never green-by-omission). The feed is authenticated with a classic PAT
      # (secret FSGG_PACKAGES_PAT, scope `read:packages`): the GitHub Packages NuGet registry does
      # NOT accept GitHub App installation tokens (App tokens work only for the Container registry),
      # and the run-scoped GITHUB_TOKEN reads only PUBLIC org packages — but the full rendering
      # scaffold restores the PRIVATE FS.GG.UI.* closure. A classic PAT is the only credential that
      # reads private GitHub Packages NuGet here.
      #   - Governance CLI (>= 1.1.0, spec-081 consumer; FS.GG.Governance#28): drives the `govern`
      #     consumer/enforcement matrix. Tolerant — an unreachable feed degrades to an honest SKIP
      #     (the matrix never false-fails on a missing tool).
      #   - SDD CLI: puts `fsgg-sdd` on PATH, which flips BOTH the full scaffold+build stage and the
      #     producer seam (`fsgg-sdd ship` emits readiness/<id>/governance-handoff.json) from SKIP to
      #     a hard gate. Required (no `|| true`): if it cannot install we want CI to surface it, not
      #     silently drop the producer-seam coverage we are explicitly enabling here.
      - name: Install FS-GG CLIs (governance enforcement + sdd producer/scaffold)
        if: steps.scope.outputs.run == 'true'
        env:
          FEED_TOKEN: ${{ secrets.FSGG_PACKAGES_PAT }}
        run: |
          dotnet nuget add source \
            --username fs-gg --password "$FEED_TOKEN" --store-password-in-clear-text \
            --name fs-gg-github "https://nuget.pkg.github.com/FS-GG/index.json" || true
          dotnet tool install --global FS.GG.Governance.Cli || true
          dotnet tool install --global FS.GG.SDD.Cli
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      # FS-GG/.github#7 (Feature 211 parity): locked restore against the committed
      # packages.lock.json. The packaging project has no NuGet dependencies today, so this is a
      # forward guardrail — if a PackageReference is ever added, drift fails CI instead of
      # resolving silently. Regenerate with: dotnet restore FS.GG.Templates.csproj --force-evaluate
      - name: Restore (locked)
        if: steps.scope.outputs.run == 'true'
        run: dotnet restore FS.GG.Templates.csproj --locked-mode
      # Owned stages (pack → install → instantiate → verify pins/links) run fully. With both
      # CLIs installed above, the gated stages also run as hard gates: the full fsgg-sdd
      # scaffold+build of the live rendering app (Stage 5), the producer seam (`fsgg-sdd ship`,
      # Stage 6a), and the governance enforcement matrix (Stage 6b). See tests/composition/run.sh.
      # KEEP_WORKDIR=1 stops run.sh's EXIT trap from rm -rf'ing the temp workdir, so the
      # pack/install/scaffold/build/govern logs survive for the failure-artifact upload below.
      # TMPDIR pins the mktemp base to a known path the upload step can glob (run.sh creates
      # $TMPDIR/fsgg-composition.XXXXXX). On green runs the workdir is just discarded with the runner.
      - name: composition test
        if: steps.scope.outputs.run == 'true'
        env:
          KEEP_WORKDIR: '1'
          TMPDIR: ${{ runner.temp }}/composition
        run: |
          mkdir -p "$TMPDIR"
          tests/composition/run.sh
      # Red runs otherwise leave only inline log tails; ship the full log set wholesale so a failure
      # is diagnosable without a re-run. Scoped to *.log to skip the built app tree.
      - name: Upload composition diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: composition-logs-${{ github.run_id }}
          path: ${{ runner.temp }}/composition/fsgg-composition.*/**/*.log
          if-no-files-found: warn
          retention-days: 7

  # ── Cross-repo contract-coherence gate ──────────────────────────────────────────────────
  # Adopted per FS-GG/.github#519 (decision: yes, the framework repos call it). The gate lives
  # in FS-GG/.github and is CALLED, never copied — it asserts that the org registry is
  # schema-valid and that its declared `fsgg-contracts` pin equals the ACTUAL FS.GG.Contracts
  # package version.
  #
  # `check-build-config: false` because registry/repos.yml does NOT list `build-config` under
  # this repo's `receives:` — it is not an adopter of the org-shared .NET build config, so the
  # drift leg has no subject here and would fail on a file this repo is not supposed to have.
  # This is read off the registry, not a workaround: if that `receives:` row ever gains
  # `build-config`, flip this to true in the same change.
  #
  # `packages: read` is MANDATORY for callers: the gate restores the typed fsgg-sdd registry
  # validator from the org GitHub Packages feed using the run-scoped GITHUB_TOKEN.
  contract-coherence:
    uses: FS-GG/.github/.github/workflows/contract-coherence.yml@main
    permissions:
      contents: read
      packages: read
    with:
      check-build-config: false
